<!DOCTYPE html>
<html lang="en">

<head>
    <title>WhatsApp Link Generator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="stage">
        <section class="card whatsapp-card shadow-lg" aria-labelledby="app-title">

            <!-- Header -->
            <header class="wa-header">
                <div class="wa-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l4.98-1.36A10 10 0 1 0 12 2Z" fill="currentColor" opacity="0.16"/>
                        <path d="M12 3.6A8.4 8.4 0 0 0 4.9 16.7l.24.4-.86 3.14 3.2-.86.4.22A8.4 8.4 0 1 0 12 3.6Z" fill="currentColor" opacity="0.32"/>
                        <path d="M9.1 7.6c-.22-.5-.45-.5-.66-.51h-.56c-.2 0-.51.07-.78.36-.27.28-1.02.99-1.02 2.42s1.04 2.8 1.19 3c.14.19 2.03 3.1 5 4.24 2.47.95 2.98.76 3.51.71.53-.05 1.72-.7 1.96-1.38.24-.68.24-1.26.17-1.38-.07-.12-.26-.19-.55-.34-.29-.14-1.72-.85-1.99-.95-.27-.1-.46-.14-.65.14-.2.29-.75.94-.92 1.14-.17.19-.34.21-.63.07-.29-.14-1.22-.45-2.32-1.44-.86-.76-1.44-1.71-1.61-2-.17-.29-.02-.44.13-.58.13-.13.29-.34.43-.5.14-.17.19-.29.29-.48.1-.19.05-.36-.02-.5-.07-.14-.63-1.56-.89-2.15Z" fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <h1 id="app-title" class="wa-title">WhatsApp Link Generator</h1>
                    <p class="wa-subtitle">Create a direct chat link in seconds</p>
                </div>
            </header>

            <!-- Info -->
            <div class="alert alert-info wa-hint mb-3" role="note">
                Pick a country, add a number, write an optional message, then generate your link.
            </div>

            <!-- Form -->
            <form id="form-generate-url" novalidate>

                <div class="mb-3">
                    <label class="form-label" for="input-phone-number">Phone number</label>

                    <div class="phone-row">
                        <div class="dropdown">
                            <button id="dropdown-country-code"
                                class="btn dropdown-toggle wa-code-btn"
                                type="button"
                                data-bs-toggle="dropdown"
                                aria-expanded="false">
                                <span class="wa-flag" aria-hidden="true">🇳🇮</span>
                                <span class="wa-code">+505</span>
                            </button>

                            <ul class="dropdown-menu wa-dropdown-menu p-2">
                                <input id="input-country-search"
                                    type="text"
                                    class="form-control form-control-sm mb-2"
                                    placeholder="Search country or code"
                                    autocomplete="off">

                                <div id="list-country-codes" class="country-list"></div>
                            </ul>
                        </div>

                        <input id="input-phone-number"
                            class="form-control"
                            type="tel"
                            inputmode="tel"
                            placeholder="8123 4567"
                            aria-describedby="phone-help">
                    </div>

                    <div id="phone-help" class="form-text">Enter the number without the country code.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="input-message">Message <span class="wa-optional">(optional)</span></label>
                    <textarea id="input-message"
                        class="form-control"
                        rows="2"
                        placeholder="Hi! I'd like more information 😊"></textarea>
                </div>

                <button id="btn-generate-url" type="submit" class="btn wa-btn-primary w-100">
                    Generate link
                </button>
            </form>

            <!-- Error -->
            <div id="error-message" class="alert alert-danger wa-alert mt-3" role="alert">
                <strong>Error:</strong>
                <span id="error-message-text"></span>
            </div>

            <!-- Result -->
            <div id="result-url" class="alert alert-success wa-alert mt-3" role="status">
                <h6 class="wa-result-label">Your link is ready</h6>

                <div class="wa-result-row">
                    <a id="generated-url" href="#" target="_blank" rel="noopener" class="wa-result-link"></a>
                    <button id="btn-copy-url" type="button" class="btn wa-btn-copy">Copy</button>
                </div>
            </div>

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
